<header
    class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">

    <!-- Left -->

    <div>

        <h1 class="text-2xl font-bold text-slate-800">

            Dashboard

        </h1>

        <p class="text-slate-500">

            Welcome back,

            <span class="font-semibold">

                {{ authService.getFullName() }}

            </span>

        </p>

    </div>

    <!-- Right -->

    <div class="flex items-center gap-6">

        <!-- Date -->

        <div class="hidden md:flex items-center gap-2 text-slate-500">

            <mat-icon>

                calendar_month

            </mat-icon>

            {{ today | date:'mediumDate' }}

        </div>

        <!-- Role Badge -->

        <span
            class="rounded-full bg-indigo-100 px-4 py-2 text-sm font-medium text-indigo-700">

            {{ authService.getRole() }}

        </span>

        <!-- Avatar -->

        <div
            class="h-11 w-11 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">

            {{ getInitials() }}

        </div>

    </div>

</header>
