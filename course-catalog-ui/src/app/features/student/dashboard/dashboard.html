<div class="space-y-8">

    <div>

        <h1 class="text-4xl font-bold text-slate-800">

            Student Dashboard

        </h1>

        <p class="mt-2 text-slate-500">

            Overview of your learning progress.

        </p>

    </div>

    @if(loading()) {

        <div class="rounded-xl bg-white p-8 shadow">

            Loading...

        </div>

    }

    @else if(dashboard()) {

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div
                class="rounded-2xl bg-white p-6 shadow border border-slate-200">

                <p class="text-slate-500">

                    Enrolled Courses

                </p>

                <h2 class="mt-4 text-5xl font-bold text-indigo-600">

                    {{ dashboard()!.enrolledCourses }}

                </h2>

            </div>

            <div
                class="rounded-2xl bg-white p-6 shadow border border-slate-200">

                <p class="text-slate-500">

                    Available Courses

                </p>

                <h2 class="mt-4 text-5xl font-bold text-indigo-600">

                    {{ dashboard()!.availableCourses }}

                </h2>

            </div>

        </div>

    }

</div>
