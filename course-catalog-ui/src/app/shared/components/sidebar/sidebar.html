<div class="w-72 h-full bg-slate-900 text-white flex flex-col shadow-2xl">

    <!-- Logo -->

    <div class="px-6 py-8 border-b border-slate-700">

        <h1 class="text-3xl font-bold text-indigo-400">

            Course Catalog

        </h1>

        <p class="text-slate-400 mt-2 text-sm">

            {{ authService.getRole() }}

        </p>

    </div>

    <!-- User -->

    <div class="px-6 py-6 border-b border-slate-700">

        <h3 class="font-semibold text-lg">

            {{ authService.getFullName() }}

        </h3>

        <p class="text-sm text-slate-400">

            {{ authService.getRole() }}

        </p>

    </div>

    <!-- Menu -->

    <nav class="flex-1 mt-6">

        @for (item of menuItems(); track item.route) {

        <a
            [routerLink]="item.route"
            routerLinkActive="bg-indigo-600 text-white"
            class="mx-3 mb-2 flex items-center gap-4 rounded-xl px-4 py-3 transition-all duration-200 hover:bg-slate-800">

            <mat-icon>

                {{ item.icon }}

            </mat-icon>

            <span>

                {{ item.label }}

            </span>

        </a>

        }

    </nav>

    <!-- Logout -->

    <div class="p-4 border-t border-slate-700">

        <button
            (click)="logout()"
            class="w-full rounded-xl bg-red-500 py-3 font-medium hover:bg-red-600 transition">

            Logout

        </button>

    </div>

</div>
