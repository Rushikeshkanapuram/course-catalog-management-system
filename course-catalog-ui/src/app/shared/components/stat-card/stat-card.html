<div
    class="rounded-2xl bg-white p-6 shadow-sm border border-slate-200 hover:shadow-lg transition-all duration-300">

    <div class="flex items-center justify-between">

        <div>

            <p class="text-slate-500 text-sm">

                {{ title() }}

            </p>

            <h2 class="mt-3 text-4xl font-bold text-slate-800">

                {{ value() }}

            </h2>

        </div>

        <div
            class="h-16 w-16 rounded-2xl bg-indigo-100 flex items-center justify-center">

            <mat-icon
                class="text-indigo-600 scale-150">

                {{ icon() }}

            </mat-icon>

        </div>

    </div>

</div>
